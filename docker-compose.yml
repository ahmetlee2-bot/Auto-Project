services:
  backend:
    build:
      context: ./backend
    container_name: autonow-backend
    ports:
      - "8000:8000"
    environment:
      AUTONOW_FRONTEND_ORIGIN: http://localhost:3000
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: autonow-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

